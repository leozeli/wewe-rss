name: Build WeWeRSS images and push to ghcr.io
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

concurrency:
  group: docker-release
  cancel-in-progress: true

jobs:
  release-images:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (sqlite)
        id: meta-sqlite
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/leozeli/wewe-rss-sqlite
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=,format=short
          flavor: latest=false

      - name: Build and push Docker image (sqlite)
        id: build-and-push-sqlite
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-sqlite.outputs.tags }}
          labels: ${{ steps.meta-sqlite.outputs.labels }}
          target: app-sqlite
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,mode=max,scope=docker-release
